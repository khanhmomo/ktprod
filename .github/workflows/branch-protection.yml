name: Branch Protection Setup

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm run test || echo "No tests configured"
      
    - name: Build project
      run: npm run build
      
    - name: Check for TypeScript errors
      run: npx tsc --noEmit
